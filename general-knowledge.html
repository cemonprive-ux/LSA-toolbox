<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General knowledge related to the curriculum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --crypto-color: #B45309;
      --crypto-dark: #78350F;
      --crypto-light: #FEF3C7;
      --uk-color: #1E3A8A;
      --uk-dark: #1E2A6B;
      --uk-light: #DBEAFE;
      --bg: #F8F6F1;
      --text: #1A1714;
      --muted: #6B6560;
      --rule: #D9D3C8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; font-weight: 300; line-height: 1.6; }

    /* HEADER */
    header { background: var(--text); color: #F8F6F1; padding: 3rem 2rem 2.5rem; text-align: center; position: relative; overflow: hidden; }
    header::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px); }
    header h1 { font-family: "Cormorant Garamond", serif; font-size: clamp(1.6rem, 4vw, 2.8rem); font-weight: 600; line-height: 1.2; position: relative; }
    header h1 em { font-style: italic; color: #D9C99E; }
    .rule-line { width: 60px; height: 2px; background: #D9C99E; margin: 1.2rem auto 0; }

    /* MAIN */
    main { max-width: 1100px; margin: 0 auto; padding: 3rem 1.5rem 5rem; display: flex; flex-direction: column; gap: 4rem; }
    .section { display: flex; flex-direction: column; gap: 2rem; }
    .section-header { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .section-badge { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.35em 0.9em; border-radius: 2px; color: #fff; }
    .crypto .section-badge { background: var(--crypto-color); }
    .uk .section-badge { background: var(--uk-color); }
    .section-title { font-family: "Cormorant Garamond", serif; font-size: clamp(1.8rem, 3.5vw, 2.4rem); font-weight: 700; line-height: 1.1; }
    .crypto .section-title { color: var(--crypto-dark); }
    .uk .section-title { color: var(--uk-dark); }
    .divider { height: 1px; background: var(--rule); }

    /* VIDEO – facade pattern (click-to-load) */
    .video-card { border-radius: 4px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.10); background: #111; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .video-card:not(.loaded):hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .video-thumb { position: relative; background: #000; overflow: hidden; cursor: pointer; }
    .video-thumb.landscape { aspect-ratio: 16/9; }
    .video-thumb.portrait { aspect-ratio: 9/16; }
    .video-thumb:focus-visible { outline: 3px solid #fff; outline-offset: -3px; }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.85; transition: opacity 0.3s, transform 0.5s ease; }
    .video-card:hover .video-thumb img { opacity: 1; transform: scale(1.04); }
    .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 68px; height: 48px; background: rgba(0,0,0,0.7); border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; cursor: pointer; padding: 0; }
    .video-card:hover .play-button { background: #CC0000; transform: translate(-50%, -50%) scale(1.08); }
    .play-button::before { content: ""; border-left: 16px solid #fff; border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 4px; }
    .video-iframe { width: 100%; border: none; display: block; }
    .video-iframe.landscape { aspect-ratio: 16/9; }
    .video-iframe.portrait { aspect-ratio: 9/16; }
    .vid-label { display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: #B0A898; padding: 0.6rem 0.8rem; background: #1A1714; }
    .youtube-tag { font-size: 0.6rem; color: #CC4444; letter-spacing: 0.15em; }
    .crypto .video-card { border-top: 3px solid var(--crypto-color); }
    .uk .video-card { border-top: 3px solid var(--uk-color); }

    /* Layout wrappers */
    .video-wrapper-wide { max-width: 820px; margin: 0 auto; width: 100%; }
    .video-wrapper-tall { max-width: 380px; margin: 0 auto; width: 100%; }
    .crypto-bg { background: var(--crypto-light); border-radius: 6px; padding: 2rem; border: 1px solid rgba(180,83,9,0.15); }
    .uk-bg { background: var(--uk-light); border-radius: 6px; padding: 2rem; border: 1px solid rgba(30,58,138,0.15); }

    .section-sep { display: flex; align-items: center; gap: 1rem; color: var(--muted); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; }
    .section-sep::before, .section-sep::after { content: ""; flex: 1; height: 1px; background: var(--rule); }

    .video-caption { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 1rem; font-style: italic; }

    @media (max-width: 700px) { header { padding: 2.5rem 1.5rem 2rem; } .crypto-bg, .uk-bg { padding: 1.25rem; } }
  </style>
</head>
<body>

<header>
  <h1>General knowledge<br><em>related to the curriculum</em></h1>
  <div class="rule-line"></div>
</header>

<main>

  <!-- ══════════════ CRYPTOCURRENCIES ══════════════ -->
  <section class="section crypto">
    <div class="section-header">
      <span class="section-badge">Topic 1</span>
      <h2 class="section-title">Cryptocurrencies</h2>
    </div>
    <div class="divider"></div>

    <div class="crypto-bg">
      <div class="video-wrapper-wide">
        <div class="video-card" data-video-id="uY5FTf7CsPw" data-video-title="Cryptocurrencies explained" data-format="landscape">
          <div class="video-thumb landscape" role="button" tabindex="0" aria-label="Play cryptocurrencies video">
            <img src="https://i.ytimg.com/vi/uY5FTf7CsPw/hqdefault.jpg" alt="" loading="lazy">
            <span class="play-button" aria-hidden="true"></span>
          </div>
          <div class="vid-label">
            <span>Video · Cryptocurrencies</span>
            <span class="youtube-tag">▸ YouTube</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="section-sep">·</div>

  <!-- ══════════════ UK VS GB ══════════════ -->
  <section class="section uk">
    <div class="section-header">
      <span class="section-badge">Topic 2</span>
      <h2 class="section-title">UK vs GB</h2>
    </div>
    <div class="divider"></div>

    <div class="uk-bg">
      <div class="video-wrapper-tall">
        <div class="video-card" data-video-id="xoP0HYz5oUE" data-video-title="UK vs GB short" data-format="portrait">
          <div class="video-thumb portrait" role="button" tabindex="0" aria-label="Play UK vs GB short video">
            <img src="https://i.ytimg.com/vi/xoP0HYz5oUE/hqdefault.jpg" alt="" loading="lazy">
            <span class="play-button" aria-hidden="true"></span>
          </div>
          <div class="vid-label">
            <span>Short · UK vs GB</span>
            <span class="youtube-tag">▸ YouTube</span>
          </div>
        </div>
        <p class="video-caption">YouTube Short – vertical format</p>
      </div>
    </div>
  </section>

</main>

<script>
  // === LECTURE VIDÉO EMBARQUÉE (click-to-load facade) ===
  (function() {
    function loadVideo(card) {
      if (card.classList.contains('loaded')) return;
      const id = card.dataset.videoId;
      const title = card.dataset.videoTitle || 'YouTube video';
      const format = card.dataset.format || 'landscape';
      const thumb = card.querySelector('.video-thumb');
      if (!id || !thumb) return;

      const iframe = document.createElement('iframe');
      iframe.className = 'video-iframe ' + format;
      iframe.src = 'https://www.youtube-nocookie.com/embed/' + id + '?autoplay=1&rel=0&modestbranding=1&playsinline=1';
      iframe.title = title;
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen');
      iframe.setAttribute('allowfullscreen', '');
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';

      thumb.replaceWith(iframe);
      card.classList.add('loaded');
    }

    document.querySelectorAll('.video-card[data-video-id]').forEach(card => {
      const thumb = card.querySelector('.video-thumb');
      thumb.addEventListener('click', () => loadVideo(card));
      thumb.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          loadVideo(card);
        }
      });
    });
  })();
</script>

</body>
</html>
