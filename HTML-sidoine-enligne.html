<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lycée Sidoine Apollinaire — Nous suivre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:  #1a2e4a;
      --navy2: #243858;
      --gold:  #c5a55a;
      --gold2: #dbc07a;
      --cream: #f8f5ef;
      --light: #eceae4;
      --muted: #8a8278;
      --white: #ffffff;
    }
    html, body { height: 100%; }
    body {
      font-family: "DM Sans", sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(197,165,90,.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 85%, rgba(26,46,74,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      padding: 2.8rem 2.4rem 2.4rem;
      box-shadow: 0 2px 4px rgba(26,46,74,.06), 0 8px 24px rgba(26,46,74,.10), 0 32px 64px rgba(26,46,74,.08);
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
      margin-bottom: 1.8rem;
      animation: fadeDown .6s ease both;
    }
    .logo-img {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(26,46,74,.20);
    }
    .logo-name {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: 1.25rem;
      color: var(--navy);
      letter-spacing: .02em;
      text-align: center;
      line-height: 1.2;
    }
    .logo-sub {
      font-family: "DM Sans", sans-serif;
      font-size: .7rem;
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-top: .15rem;
    }
    .title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 2rem;
      padding: 0 .5rem;
      animation: fadeDown .6s .1s ease both;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-bottom: 1.6rem;
      animation: fadeIn .6s .15s ease both;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--light);
    }
    .divider span {
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }

    /* -- Ligne standard -- */
    .link-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .95rem 1.1rem;
      border-radius: 12px;
      background: var(--cream);
      text-decoration: none;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      animation: fadeUp .5s ease both;
    }
    .link-row:hover {
      background: var(--light);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,46,74,.10);
    }
    .link-row:active { transform: translateY(0); }

    .link-row:nth-child(1) { animation-delay: .20s; }
    .link-row:nth-child(2) { animation-delay: .28s; }
    .link-row:nth-child(3) { animation-delay: .36s; }
    .link-row:nth-child(4) { animation-delay: .44s; }

    .icon-wrap {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-label {
      flex: 1;
      font-size: .92rem;
      font-weight: 500;
      color: var(--navy);
    }
    .link-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform .2s ease, color .2s ease;
    }
    .link-row:hover .link-arrow { transform: translateX(3px); color: var(--gold); }

    /* -- Séparateur avant l'app -- */
    .divider-app {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-top: .3rem;
      animation: fadeIn .6s .5s ease both;
    }
    .divider-app::before, .divider-app::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--light);
    }
    .divider-app span {
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* -- Bloc appli mobile (même fond crème que les autres) -- */
    .app-block {
      border-radius: 12px;
      background: var(--cream);
      overflow: hidden;
      animation: fadeUp .5s .52s ease both;
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .95rem 1.1rem .7rem;
    }
    .app-title {
      flex: 1;
      font-size: .92rem;
      font-weight: 500;
      color: var(--navy);
    }
    .app-sep {
      height: 1px;
      background: var(--light);
      margin: 0 1.1rem;
    }
    .app-stores {
      display: flex;
      gap: .5rem;
      padding: .7rem 1.1rem .95rem;
    }
    .store-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      padding: .55rem .7rem;
      border-radius: 8px;
      background: var(--navy);
      text-decoration: none;
      transition: background .2s ease, transform .2s ease;
    }
    .store-btn:hover {
      background: var(--navy2);
      transform: translateY(-1px);
    }
    .store-btn span {
      font-size: .78rem;
      font-weight: 500;
      color: var(--white);
      white-space: nowrap;
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .6;
      animation: fadeIn .8s .7s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .ic-web { background: var(--navy); }
    .ic-app { background: var(--navy); }
    .ic-li  { background: #0a66c2; }
    .ic-ig  { background: linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4); }
    .ic-fb  { background: #1877f2; }
  </style>
</head>
